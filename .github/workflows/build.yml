name: Build Flutter APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        
    - uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        
    - name: Find Project Root and Build
      run: |
        # pubspec.yaml ရှိသော Folder ကို အလိုအလျောက်ရှာဖွေခြင်း
        PROJECT_DIR=$(dirname $(find . -name "pubspec.yaml" | head -n 1))
        echo "Found Flutter project at: $PROJECT_DIR"
        cd $PROJECT_DIR
        flutter pub get
        flutter build apk --debug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: heybro-apk
        # ဖိုင်တွဲအမည် မည်သို့ပင်ဖြစ်စေ APK ကို အလိုအလျောက် ရှာဖွေပေးမည်
        path: '**/build/app/outputs/flutter-apk/app-debug.apk'
